name: Screenshots

on:
  workflow_dispatch:
  release:
    types: [published]
  push:
    branches: [main]
    paths:
      - "src/components/**"
      - "src/app/**"
      - "e2e/screenshots.spec.ts"

jobs:
  capture:
    name: Capture application screenshots
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build application
        run: npm run build
        env:
          DATABASE_URL: "postgresql://placeholder:placeholder@localhost:5432/placeholder"
          AUTH_SECRET: "screenshot-ci-secret-not-real"

      - name: Start application and capture screenshots
        run: |
          npm start &
          npx wait-on http://localhost:3000 --timeout 30000
          npx playwright test --config playwright.config.ts
        env:
          DATABASE_URL: "postgresql://placeholder:placeholder@localhost:5432/placeholder"
          AUTH_SECRET: "screenshot-ci-secret-not-real"

      - name: Upload screenshots as artifact
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: docs/screenshots/
          retention-days: 30

      - name: Commit updated screenshots
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: update application screenshots [automated]"
          file_pattern: "docs/screenshots/*.png"
          commit_author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
